<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – Skin Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <style>
    :root {
      --admin-bg: #fdf9f6;
    }
    body { background: var(--admin-bg); min-height: 100vh; padding: 2rem; }
    
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    
    .admin-header {
      padding: 2rem;
      background: var(--charcoal);
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .admin-header h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
    }

    .admin-logout {
      font-size: 0.85rem;
      color: var(--rose-light);
      cursor: pointer;
      text-decoration: underline;
    }

    /* --- Login Overlay --- */
    #loginOverlay {
      position: fixed;
      inset: 0;
      background: rgba(45,45,45,0.95);
      backdrop-filter: blur(10px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-box {
      background: #fff;
      padding: 3rem;
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
    
    .login-box h2 {
      font-family: var(--font-display);
      margin-bottom: 2rem;
      color: var(--charcoal);
    }
    
    .login-form input {
      width: 100%;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    /* --- Dashboard Content --- */
    .dashboard-content {
      padding: 2rem;
    }

    .table-responsive {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5rem;
    }

    th {
      text-align: left;
      padding: 1.25rem;
      background: var(--cream);
      color: var(--mid);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--charcoal);
    }

    tr:hover { background: var(--warm-white); }

    .badge-treatment {
      background: rgba(201,132,122,0.1);
      color: var(--rose);
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      font-weight: 500;
      font-size: 0.8rem;
    }

    .status-new {
      color: #2ecc71;
      font-weight: 600;
    }

    #appointmentsList.loading {
        opacity: 0.5;
        pointer-events: none;
    }

    .empty-state {
        text-align: center;
        padding: 4rem;
        color: var(--muted);
    }
    
    .btn-back {
        margin-top: 2rem;
        display: inline-block;
        color: var(--rose);
        font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- LOGIN OVERLAY -->
  <div id="loginOverlay">
    <div class="login-box">
      <h2>Admin Login</h2>
      <form class="login-form" id="loginForm">
        <input type="password" id="adminPassword" placeholder="Enter password" required autofocus />
        <button type="submit" class="btn btn-primary btn-full">Login</button>
      </form>
      <a href="index.html" class="btn-back">← Back to Site</a>
    </div>
  </div>

  <!-- ADMIN CONTAINER -->
  <div class="admin-container" id="adminDashboard" style="display:none;">
    <header class="admin-header">
      <h1>Appointment Dashboard</h1>
      <span class="admin-logout" id="logoutBtn">Logout</span>
    </header>
    
    <div class="dashboard-content">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Date & Time</th>
              <th>Patient</th>
              <th>Contact</th>
              <th>Treatment</th>
              <th>Details</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="appointmentsList">
            <!-- Rows injected by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="scripts/admin.js"></script>
</body>
</html>
